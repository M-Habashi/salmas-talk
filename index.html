<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyUVM: Open-Source Verification with Python</title>
  <link rel="stylesheet" href="assets/css/pyuvm_presentation.css">
</head>
<body>
  <div class="presentation" id="presentationRoot"></div>
  <div class="progress-bar" id="progressBar"></div>
  <div class="slide-counter"><span class="current" id="currentSlide">01</span><span> / </span><span id="totalSlides">00</span></div>
  <div class="laser-pointer" id="laserPointer" aria-hidden="true" hidden></div>
  <canvas class="pen-layer" id="penLayer" aria-hidden="true" hidden></canvas>
  <div class="style-toolbar is-hidden" id="styleToolbar">
    <select class="style-select style-select--preset" id="stylePreset" aria-label="Font style">
      <option value="body">Body</option>
      <option value="display">Display</option>
      <option value="serif">Serif</option>
      <option value="mono">Mono</option>
    </select>
    <div class="style-divider" aria-hidden="true"></div>
    <input class="style-select style-select--size" id="styleSize" aria-label="Font size" type="number" min="8" max="200" step="1" value="16">
    <div class="style-divider" aria-hidden="true"></div>
    <button type="button" class="style-btn" id="styleBold" aria-label="Bold">B</button>
    <button type="button" class="style-btn style-btn--italic" id="styleItalic" aria-label="Italic">I</button>
    <button type="button" class="style-btn style-btn--underline" id="styleUnderline" aria-label="Underline">U</button>
    <div class="style-divider" aria-hidden="true"></div>
    <div class="style-bundled-group">
      <div class="style-color-picker">
        <button type="button" class="style-btn style-btn--color" id="styleColorToggle" aria-label="Colors">
          <span class="style-color-chip"></span>
          <svg class="style-chevron" viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="style-swatches is-hidden" id="styleSwatches"></div>
      </div>
      <div class="style-alignments" id="styleAlignments">
        <button type="button" class="style-align-btn" data-align="left" aria-label="Align left">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="15" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <button type="button" class="style-align-btn" data-align="center" aria-label="Align center">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="6" y1="12" x2="18" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <button type="button" class="style-align-btn" data-align="right" aria-label="Align right">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="9" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
      <button type="button" class="style-btn style-btn--align" id="styleAlignToggle" aria-label="Toggle alignment options">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="6" y1="12" x2="18" y2="12"></line>
          <line x1="9" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>
  <script src="assets/js/pyuvm_slide_templates.js"></script>
  <script src="assets/js/slides/pyuvm_slide_support.js"></script>
  <script src="assets/js/slides/pyuvm_slide_assets_architecture.js"></script>
  <script src="assets/js/slides/pyuvm_slide_assets_technical.js"></script>
  <script src="assets/js/slides/pyuvm_slide_sections_intro.js"></script>
  <script src="assets/js/slides/pyuvm_slide_sections_architecture.js"></script>
  <script src="assets/js/slides/pyuvm_slide_sections_flow.js"></script>
  <script src="assets/js/pyuvm_slides_data.js"></script>
  <script src="assets/js/pyuvm_presentation_data.js"></script>
  <script src="assets/js/pyuvm_style_toolbar.js"></script>
  <script src="assets/js/presentation/pyuvm_presentation_state.js"></script>
  <script src="assets/js/presentation/pyuvm_presentation_stacking.js"></script>
  <script src="assets/js/presentation/pyuvm_presentation_navigation.js"></script>
  <script src="assets/js/presentation/pyuvm_presentation_editor.js"></script>
  <script src="assets/js/presentation/pyuvm_presentation_interactions.js"></script>
  <script src="assets/js/pyuvm_presentation.js"></script>
</body>
</html>
