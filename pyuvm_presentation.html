<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyUVM: Open-Source Verification with Python</title>
  <link rel="stylesheet" href="assets/css/pyuvm_presentation.css">
</head>
<body>
  <div class="presentation" id="presentationRoot"></div>
  <div class="progress-bar" id="progressBar"></div>
  <div class="slide-counter"><span class="current" id="currentSlide">01</span><span> / </span><span id="totalSlides">00</span></div>
  <div class="nav-hint"><kbd>&larr;</kbd><kbd>&rarr;</kbd><span>navigate</span></div>
  <div class="style-toolbar is-hidden" id="styleToolbar">
    <select class="style-select" id="stylePreset" aria-label="Font style">
      <option value="body">Body</option>
      <option value="display">Display</option>
      <option value="serif">Serif</option>
      <option value="mono">Mono</option>
    </select>
    <input class="style-select style-select--size" id="styleSize" aria-label="Font size" type="number" min="8" max="200" step="1" value="16">
    <button type="button" class="style-btn" id="styleBold" aria-label="Bold">B</button>
    <button type="button" class="style-btn style-btn--italic" id="styleItalic" aria-label="Italic">I</button>
    <button type="button" class="style-btn style-btn--underline" id="styleUnderline" aria-label="Underline">U</button>
    <button type="button" class="style-btn style-btn--color" id="styleColorToggle" aria-label="Colors"><span class="style-color-chip"></span></button>
    <div class="style-swatches is-hidden" id="styleSwatches"></div>
    <button type="button" class="style-btn style-btn--align" id="styleAlignToggle" aria-label="Alignment">≡</button>
    <div class="style-alignments is-hidden" id="styleAlignments">
      <button type="button" class="style-align-btn" data-align="left" aria-label="Align left">≡</button>
      <button type="button" class="style-align-btn" data-align="center" aria-label="Align center">≣</button>
      <button type="button" class="style-align-btn" data-align="right" aria-label="Align right">☰</button>
    </div>
  </div>
  <script src="assets/js/pyuvm_slide_templates.js"></script>
  <script src="assets/js/pyuvm_slides_data.js"></script>
  <script src="assets/js/pyuvm_presentation_data.js"></script>
  <script src="assets/js/pyuvm_style_toolbar.js"></script>
  <script src="assets/js/pyuvm_presentation.js"></script>
</body>
</html>
