<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyUVM: Open-Source Verification with Python</title>
  <link rel="stylesheet" href="pyuvm_presentation.css">
</head>
<body>
  <div class="presentation" id="presentationRoot"></div>
  <div class="progress-bar" id="progressBar"></div>
  <div class="slide-counter"><span class="current" id="currentSlide">01</span><span> / </span><span id="totalSlides">00</span></div>
  <div class="nav-hint"><kbd>&larr;</kbd><kbd>&rarr;</kbd><span>navigate</span></div>
  <div class="font-toolbar" id="fontToolbar">
    <button type="button" class="font-btn" id="fontDecrease" aria-label="Decrease font size">A-</button>
    <span class="font-size-readout" id="fontSizeReadout">--</span>
    <button type="button" class="font-btn" id="fontIncrease" aria-label="Increase font size">A+</button>
  </div>
  <script src="pyuvm_slide_templates.js"></script>
  <script src="pyuvm_slides_data.js"></script>
  <script src="pyuvm_presentation_data.js"></script>
  <script src="pyuvm_presentation.js"></script>
</body>
</html>
